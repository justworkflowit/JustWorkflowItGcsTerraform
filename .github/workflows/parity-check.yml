name: Contract Parity Check

on:
  repository_dispatch:
    types: [contract-updated]
  schedule:
    - cron: '0 0 * * 1'  # Weekly Monday midnight UTC

jobs:
  parity:
    name: Validate Against Latest Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Sync contract from npm
        run: |
          TMP=$(mktemp -d)
          cd "$TMP"
          npm pack @justworkflowit/cdk-constructs --quiet
          tar xzf justworkflowit-cdk-constructs-*.tgz
          cp package/resource-contract.json "$GITHUB_WORKSPACE/resource-contract.json"
          rm -rf "$TMP"

      - name: Validate parity
        run: node scripts/validate-parity.js gcp

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Parity check failed: GCS Terraform module out of sync with CDK constructs';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'parity-drift'
            });
            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: 'The resource contract from `@justworkflowit/cdk-constructs` has changed and this Terraform module needs to be updated to match.\n\nRun `node scripts/validate-parity.js gcp` locally to see the specific failures.',
                labels: ['parity-drift']
              });
            }
